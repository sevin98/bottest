name: Slack PR Bot

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - review_requested
      - review_request_removed
      - edited
      - closed

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    environment: SLACK_BOT_TOKEN

    env:
      SLACK_USER_MAP: '{"m-a-king":"U0AKAEF2K9U","1o18z":"U0AKQ6G8BT3","sevin98":"U0AK6U2J62F"}'

    steps:
      - name: Extract PR data
        id: pr
        shell: bash
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          ACTION="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"
          IS_DRAFT="${{ github.event.pull_request.draft }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"

          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "merged=$MERGED" >> "$GITHUB_OUTPUT"
          echo "is_draft=$IS_DRAFT" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

          echo "pr_title<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "pr_body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PR_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Find existing Slack ts
        id: find_ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENTS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/comments")

          BODY=$(echo "$COMMENTS" | jq -r '.[] | select(.body | contains("slack-pr-bot")) | .body' | tail -n 1)

          TS=$(echo "$BODY" | sed -n 's/.*"ts":"\([^"]*\)".*/\1/p')
          CHANNEL=$(echo "$BODY" | sed -n 's/.*"channel":"\([^"]*\)".*/\1/p')

          echo "ts=$TS" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Post parent message
        if: |
          steps.find_ts.outputs.ts == '' &&
          (
            (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
            github.event.action == 'ready_for_review'
          )
        id: post_parent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mention() {
            id="$1"
            sid=$(echo "$SLACK_USER_MAP" | jq -r --arg id "$id" '.[$id] // empty')
            if [ -n "$sid" ]; then echo "<@$sid>"; else echo "@$id"; fi
          }

          reviewers=$(jq -r '.pull_request.requested_reviewers[]?.login' "$GITHUB_EVENT_PATH")

          if [ -z "$reviewers" ]; then
            reviewer_text="없음"
          else
            reviewer_text=""
            while read r; do
              [ -z "$r" ] && continue
              m=$(mention "$r")
              if [ -z "$reviewer_text" ]; then
                reviewer_text="$m"
              else
                reviewer_text="$reviewer_text, $m"
              fi
            done <<< "$reviewers"
          fi

          pr_body=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")

          issues=$(echo "$pr_body" | grep -oiE '\bclose[sd]?[[:space:]]+#[0-9]+' | grep -oE '#[0-9]+' | sort -u)

          if [ -z "$issues" ]; then
            issue_text="없음"
          else
            issue_text=""
            for issue in $issues; do
              num=$(echo "$issue" | tr -d '#')
              state=$(curl -s \
                -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$num" | jq -r '.state')

              if [ "$state" = "open" ]; then emoji="🟢"; else emoji="⚫"; fi

              line="$emoji <https://github.com/${{ github.repository }}/issues/$num|#$num>"

              if [ -z "$issue_text" ]; then
                issue_text="$line"
              else
                issue_text="$issue_text\n$line"
              fi
            done
          fi

          summary=$(echo "$pr_body" | grep -E '^- ' | head -n 1 | sed 's/^- //')
          [ -z "$summary" ] && summary="요약 없음"

          title_link="<${{ steps.pr.outputs.pr_url }}|#${{ steps.pr.outputs.pr_number }} ${{ steps.pr.outputs.pr_title }}>"

          text="[PR] $title_link\n\n🔥 연관 이슈\n$issue_text\n\n📝 작업 요약\n$summary\n\n👤 작성자: ${{ steps.pr.outputs.author }}\n🌿 브랜치: ${{ steps.pr.outputs.head_ref }} -> ${{ steps.pr.outputs.base_ref }}\n👀 리뷰어: $reviewer_text"

          RESP=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "$(jq -n --arg channel "${{ secrets.SLACK_CHANNEL_ID }}" --arg text "$text" '{channel:$channel,text:$text,unfurl_links:false,unfurl_media:false}')")

          echo "$RESP"

          ts=$(echo "$RESP" | jq -r '.ts')
          echo "ts=$ts" >> "$GITHUB_OUTPUT"

      - name: Save Slack ts
        if: steps.post_parent.outputs.ts != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="<!-- slack-pr-bot: {\"channel\":\"${{ secrets.SLACK_CHANNEL_ID }}\",\"ts\":\"${{ steps.post_parent.outputs.ts }}\"} -->"

          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/comments" \
            -d "$(jq -n --arg body "$BODY" '{body:$body}')"

      - name: Reply thread
        if: github.event.action != 'opened' && steps.find_ts.outputs.ts != ''
        run: |
          THREAD_TS="${{ steps.find_ts.outputs.ts }}"
          CHANNEL_ID="${{ steps.find_ts.outputs.channel }}"
          ACTION="${{ steps.pr.outputs.action }}"
          MERGED="${{ steps.pr.outputs.merged }}"

          mention() {
            id="$1"
            sid=$(echo "$SLACK_USER_MAP" | jq -r --arg id "$id" '.[$id] // empty')
            if [ -n "$sid" ]; then echo "<@$sid>"; else echo "@$id"; fi
          }

          if [ "$ACTION" = "ready_for_review" ]; then
            TEXT="👀 Draft 해제됨"
          elif [ "$ACTION" = "review_requested" ]; then
            r=$(jq -r '.requested_reviewer.login // ""' "$GITHUB_EVENT_PATH")
            TEXT="🙋 리뷰 요청됨: $(mention "$r")"
          elif [ "$ACTION" = "review_request_removed" ]; then
            r=$(jq -r '.requested_reviewer.login // ""' "$GITHUB_EVENT_PATH")
            TEXT="➖ 리뷰 요청 해제됨: $(mention "$r")"
          elif [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            TEXT="✅ 머지 완료: ${{ steps.pr.outputs.head_ref }} -> ${{ steps.pr.outputs.base_ref }}"
          elif [ "$ACTION" = "closed" ]; then
            TEXT="🗑️ 머지 없이 종료됨"
          else
            exit 0
          fi

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "$(jq -n \
              --arg channel "$CHANNEL_ID" \
              --arg text "$TEXT" \
              --arg thread_ts "$THREAD_TS" \
              '{channel:$channel,text:$text,thread_ts:$thread_ts,unfurl_links:false,unfurl_media:false}')"