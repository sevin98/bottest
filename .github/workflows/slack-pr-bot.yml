name: Slack PR Bot

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - review_requested
      - review_request_removed
      - edited
      - closed

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    environment: SLACK_BOT_TOKEN
    env:
      SLACK_USER_MAP: '{"m-a-king":"U0AKAEF2K9U","1o18z":"U0AKQ6G8BT3","sevin98":"U0AK6U2J62F"}'

    steps:
      - name: Extract PR data
        id: pr
        shell: bash
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          ACTION="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"
          IS_DRAFT="${{ github.event.pull_request.draft }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          {
            echo "pr_title<<EOF"
            echo "$PR_TITLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "merged=$MERGED" >> "$GITHUB_OUTPUT"
          echo "is_draft=$IS_DRAFT" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

          {
            echo "pr_body<<EOF"
            echo "$PR_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing Slack ts from PR comments
        id: find_ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          COMMENTS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/comments")

          BODY=$(echo "$COMMENTS" | jq -r '.[] | select(.body | contains("slack-pr-bot")) | .body' | tail -n 1)

          TS=$(echo "$BODY" | sed -n 's/.*"ts":"\([^"]*\)".*/\1/p')
          CHANNEL=$(echo "$BODY" | sed -n 's/.*"channel":"\([^"]*\)".*/\1/p')

          echo "ts=$TS" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Post parent message
        if: |
          steps.find_ts.outputs.ts == '' &&
          (
            (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
            github.event.action == 'ready_for_review'
          )
        id: post_parent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mention_slack_user() {
            local github_id="$1"
            local slack_id
            slack_id=$(echo "$SLACK_USER_MAP" | jq -r --arg id "$github_id" '.[$id] // empty')

            if [ -n "$slack_id" ]; then
              echo "<@$slack_id>"
            else
              echo "@$github_id"
            fi
          }

          build_reviewer_text() {
            local reviewers
            local reviewer_text
            local user_mention

            reviewers=$(jq -r '.pull_request.requested_reviewers[]?.login' "$GITHUB_EVENT_PATH")
            reviewer_text=""

            if [ -z "$reviewers" ]; then
              echo "없음"
              return
            fi

            while IFS= read -r reviewer; do
              [ -z "$reviewer" ] && continue
              user_mention=$(mention_slack_user "$reviewer")

              if [ -z "$reviewer_text" ]; then
                reviewer_text="$user_mention"
              else
                reviewer_text="$reviewer_text, $user_mention"
              fi
            done <<< "$reviewers"

            [ -z "$reviewer_text" ] && reviewer_text="없음"
            echo "$reviewer_text"
          }

          build_issue_text() {
            local pr_body="$1"
            local issues
            local issue_text
            local num
            local res
            local state
            local emoji
            local link
            local line

            issues=$(echo "$pr_body" | grep -oiE '\bclose[sd]?[[:space:]]+#[0-9]+' | grep -oE '#[0-9]+' | sort -u || true)
            issue_text=""

            if [ -z "$issues" ]; then
              echo "없음"
              return
            fi

            while IFS= read -r issue; do
              [ -z "$issue" ] && continue
              num=$(echo "$issue" | tr -d '#')

              res=$(curl -s \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$num")

              state=$(echo "$res" | jq -r '.state // "unknown"')

              if [ "$state" = "open" ]; then
                emoji="🟢"
              elif [ "$state" = "closed" ]; then
                emoji="⚫"
              else
                emoji="❓"
              fi

              link="https://github.com/${{ github.repository }}/issues/$num"
              line="$emoji <$link|#$num>"

              if [ -z "$issue_text" ]; then
                issue_text="$line"
              else
                issue_text=$(printf "%s\n%s" "$issue_text" "$line")
              fi
            done <<< "$issues"

            [ -z "$issue_text" ] && issue_text="없음"
            echo "$issue_text"
          }

          build_summary() {
            local pr_body="$1"
            local summary

            summary=$(echo "$pr_body" | grep -E '^- ' | head -n 1 | sed 's/^- //')
            [ -z "$summary" ] && summary="요약 없음"
            echo "$summary"
          }

          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          REVIEWER_TEXT=$(build_reviewer_text)
          ISSUE_TEXT=$(build_issue_text "$PR_BODY")
          SUMMARY=$(build_summary "$PR_BODY")
          TITLE_LINK="<${{ steps.pr.outputs.pr_url }}|#${{ steps.pr.outputs.pr_number }} ${{ steps.pr.outputs.pr_title }}>"

          TEXT=$(cat <<EOF
          [PR] $TITLE_LINK

          🔥 연관 이슈
          $ISSUE_TEXT

          📝 작업 요약
          $SUMMARY

          👤 작성자: ${{ steps.pr.outputs.author }}
          🌿 브랜치: ${{ steps.pr.outputs.head_ref }} -> ${{ steps.pr.outputs.base_ref }}
          👀 리뷰어: $REVIEWER_TEXT
          EOF
          )

          RESP=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n \
              --arg channel "${{ secrets.SLACK_CHANNEL_ID }}" \
              --arg text "$TEXT" \
              '{channel:$channel,text:$text,unfurl_links:false,unfurl_media:false}')")

          OK=$(echo "$RESP" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "Slack post failed"
            echo "$RESP"
            exit 1
          fi

          TS=$(echo "$RESP" | jq -r '.ts')
          echo "ts=$TS" >> "$GITHUB_OUTPUT"

      - name: Save Slack ts into PR comment
        if: steps.post_parent.outputs.ts != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BODY="<!-- slack-pr-bot: {\"channel\":\"${{ secrets.SLACK_CHANNEL_ID }}\",\"ts\":\"${{ steps.post_parent.outputs.ts }}\"} -->"

          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/comments" \
            -d "$(jq -n --arg body "$BODY" '{body:$body}')"

      - name: Update parent Slack message
        if: github.event.action != 'opened' && steps.find_ts.outputs.ts != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mention_slack_user() {
            local github_id="$1"
            local slack_id
            slack_id=$(echo "$SLACK_USER_MAP" | jq -r --arg id "$github_id" '.[$id] // empty')

            if [ -n "$slack_id" ]; then
              echo "<@$slack_id>"
            else
              echo "@$github_id"
            fi
          }

          build_reviewer_text() {
            local reviewers
            local reviewer_text
            local user_mention

            reviewers=$(jq -r '.pull_request.requested_reviewers[]?.login' "$GITHUB_EVENT_PATH")
            reviewer_text=""

            if [ -z "$reviewers" ]; then
              echo "없음"
              return
            fi

            while IFS= read -r reviewer; do
              [ -z "$reviewer" ] && continue
              user_mention=$(mention_slack_user "$reviewer")

              if [ -z "$reviewer_text" ]; then
                reviewer_text="$user_mention"
              else
                reviewer_text="$reviewer_text, $user_mention"
              fi
            done <<< "$reviewers"

            [ -z "$reviewer_text" ] && reviewer_text="없음"
            echo "$reviewer_text"
          }

          build_issue_text() {
            local pr_body="$1"
            local issues
            local issue_text
            local num
            local res
            local state
            local emoji
            local link
            local line

            issues=$(echo "$pr_body" | grep -oiE '\bclose[sd]?[[:space:]]+#[0-9]+' | grep -oE '#[0-9]+' | sort -u || true)
            issue_text=""

            if [ -z "$issues" ]; then
              echo "없음"
              return
            fi

            while IFS= read -r issue; do
              [ -z "$issue" ] && continue
              num=$(echo "$issue" | tr -d '#')

              res=$(curl -s \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$num")

              state=$(echo "$res" | jq -r '.state // "unknown"')

              if [ "$state" = "open" ]; then
                emoji="🟢"
              elif [ "$state" = "closed" ]; then
                emoji="⚫"
              else
                emoji="❓"
              fi

              link="https://github.com/${{ github.repository }}/issues/$num"
              line="$emoji <$link|#$num>"

              if [ -z "$issue_text" ]; then
                issue_text="$line"
              else
                issue_text=$(printf "%s\n%s" "$issue_text" "$line")
              fi
            done <<< "$issues"

            [ -z "$issue_text" ] && issue_text="없음"
            echo "$issue_text"
          }

          build_summary() {
            local pr_body="$1"
            local summary

            summary=$(echo "$pr_body" | grep -E '^- ' | head -n 1 | sed 's/^- //')
            [ -z "$summary" ] && summary="요약 없음"
            echo "$summary"
          }

          CHANNEL_ID="${{ steps.find_ts.outputs.channel }}"
          PARENT_TS="${{ steps.find_ts.outputs.ts }}"
          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          REVIEWER_TEXT=$(build_reviewer_text)
          ISSUE_TEXT=$(build_issue_text "$PR_BODY")
          SUMMARY=$(build_summary "$PR_BODY")
          TITLE_LINK="<${{ steps.pr.outputs.pr_url }}|#${{ steps.pr.outputs.pr_number }} ${{ steps.pr.outputs.pr_title }}>"

          TEXT=$(cat <<EOF
          [PR] $TITLE_LINK
          
          
          🔥 *연관 이슈*
          $ISSUE_TEXT
          
          
          📝 *작업 요약*
          $SUMMARY
          
          
          *Author*: ${{ steps.pr.outputs.author }}
          *Branch*: ${{ steps.pr.outputs.head_ref }} -> ${{ steps.pr.outputs.base_ref }}
          *Reviewer*: $REVIEWER_TEXT
          EOF
          )

          RESP=$(curl -s -X POST https://slack.com/api/chat.update \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n \
              --arg channel "$CHANNEL_ID" \
              --arg ts "$PARENT_TS" \
              --arg text "$TEXT" \
              '{channel:$channel,ts:$ts,text:$text,unfurl_links:false,unfurl_media:false}')")

          OK=$(echo "$RESP" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "Slack update failed"
            echo "$RESP"
            exit 1
          fi

      - name: Reply to thread
        if: github.event.action != 'opened' && steps.find_ts.outputs.ts != ''
        shell: bash
        run: |
          THREAD_TS="${{ steps.find_ts.outputs.ts }}"
          CHANNEL_ID="${{ steps.find_ts.outputs.channel }}"
          ACTION="${{ steps.pr.outputs.action }}"
          MERGED="${{ steps.pr.outputs.merged }}"

          mention_slack_user() {
            local github_id="$1"
            local slack_id
            slack_id=$(echo "$SLACK_USER_MAP" | jq -r --arg id "$github_id" '.[$id] // empty')

            if [ -n "$slack_id" ]; then
              echo "<@$slack_id>"
            else
              echo "@$github_id"
            fi
          }

          TEXT=""

          if [ "$ACTION" = "ready_for_review" ]; then
            TEXT="👀 Draft 해제됨. 리뷰 가능한 상태입니다."
          elif [ "$ACTION" = "review_requested" ]; then
            REQUESTED_REVIEWER=$(jq -r '.requested_reviewer.login // ""' "$GITHUB_EVENT_PATH")
            if [ -n "$REQUESTED_REVIEWER" ]; then
              TEXT="🙋 리뷰 요청됨: $(mention_slack_user "$REQUESTED_REVIEWER")"
            else
              TEXT="🙋 리뷰 요청됨"
            fi
          elif [ "$ACTION" = "review_request_removed" ]; then
            REMOVED_REVIEWER=$(jq -r '.requested_reviewer.login // ""' "$GITHUB_EVENT_PATH")
            if [ -n "$REMOVED_REVIEWER" ]; then
              TEXT="➖ 리뷰 요청 해제됨: $(mention_slack_user "$REMOVED_REVIEWER")"
            else
              TEXT="➖ 리뷰 요청이 해제되었습니다."
            fi
          elif [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            TEXT="✅ PR #${{ steps.pr.outputs.pr_number }} 머지 완료: ${{ steps.pr.outputs.head_ref }} -> ${{ steps.pr.outputs.base_ref }}"
          elif [ "$ACTION" = "closed" ] && [ "$MERGED" != "true" ]; then
            TEXT="🗑️ PR #${{ steps.pr.outputs.pr_number }} 이 머지 없이 닫혔습니다: ${{ steps.pr.outputs.head_ref }} -> ${{ steps.pr.outputs.base_ref }}"
          else
            echo "No message needed."
            exit 0
          fi

          RESP=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n \
              --arg channel "$CHANNEL_ID" \
              --arg text "$TEXT" \
              --arg thread_ts "$THREAD_TS" \
              '{channel:$channel,text:$text,thread_ts:$thread_ts,reply_broadcast:false,unfurl_links:false,unfurl_media:false}')")

          OK=$(echo "$RESP" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "Slack reply failed"
            echo "$RESP"
            exit 1
          fi