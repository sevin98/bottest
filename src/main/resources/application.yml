spring:
  application:
    name: team3Bot

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  # JPA (개발용 H2 - 프로덕션에서는 MySQL 등 사용)
  datasource:
    url: jdbc:h2:mem:team3bot
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
  h2:
    console:
      enabled: true

server:
  port: 8080

# Slack
slack:
  bot-token: ${SLACK_BOT_TOKEN:}
  signing-secret: ${SLACK_SIGNING_SECRET:}
  # Notion DB의 `대상` 값과 동일하게 맞추면 됩니다. 예: Notion의 대상이 `Test`면 SLACK_CHANNEL_MAPPING_TEST 사용
  channel-mapping:
    Server: ${SLACK_CHANNEL_MAPPING_SERVER:}
    Design: ${SLACK_CHANNEL_MAPPING_DESIGN:}
    Web: ${SLACK_CHANNEL_MAPPING_WEB:}
    전체: ${SLACK_CHANNEL_MAPPING_전체:}
    Test: ${SLACK_CHANNEL_MAPPING_TEST:}

# Notion
notion:
  api-token: ${NOTION_API_TOKEN:}
  parent-page-id: ${NOTION_PARENT_PAGE_ID:}
  meeting-database-id: ${NOTION_MEETING_DATABASE_ID:}
  property:
    notes-status: ${NOTION_PROPERTY_NOTES_STATUS:회의록 상태}
  notify:
    creation-enabled: ${NOTION_NOTIFY_CREATION_ENABLED:true}
    creation-window-hours: ${NOTION_NOTIFY_CREATION_WINDOW_HOURS:72}

# 노션 회의 리마인더 + 신규 알림 + 회의록 요약 (DB 스캔 → Slack)
reminder:
  enabled: ${REMINDER_ENABLED:true}
  scan-interval-ms: ${REMINDER_SCAN_INTERVAL_MS:300000}
  scan-initial-delay-ms: ${REMINDER_SCAN_INITIAL_DELAY_MS:15000}
  skip-statuses: "${REMINDER_SKIP_STATUSES:미정,취소 및 변경}"
  timezone: ${REMINDER_TIMEZONE:Asia/Seoul}

notes:
  summary:
    enabled: ${NOTES_SUMMARY_ENABLED:true}
    done-value: ${NOTES_SUMMARY_DONE_VALUE:DONE}
    delay-after-end-minutes: ${NOTES_SUMMARY_DELAY_AFTER_END_MINUTES:30}
  meeting-default-duration-minutes: "${NOTES_MEETING_DEFAULT_DURATION_MINUTES:60}"

# OpenAI (없으면 요약 대신 본문 앞부분만 슬랙에 표시)
openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

# 로컬 OCR: 기본은 프로젝트 루트 ./tessdata (kor+eng). ./gradlew bootRun 시 자동 다운로드.
# IDE에서만 실행할 때: 한 번 ./gradlew downloadTessdata 또는 OCR_DATA_PATH 지정
ocr:
  enabled: ${OCR_ENABLED:true}
  data-path: ${OCR_DATA_PATH:}
  language: ${OCR_LANGUAGE:kor+eng}
  auto-download-trained-data: ${OCR_AUTO_DOWNLOAD_TESSDATA:true}
  # 상품명/가격 OCR 휴리스틱 (테스트용 — 토글·단어 목록 조정 가능)
  purchase-parse:
    name-ignore-tokens:
      - new
      - sale
      - best
      - hot
      - event
    treat-won-suffix-as-price-line: true
    treat-won-symbol-prefix-as-price-line: true
    # 상품명 후보 줄 제외: 배송·적립·간편결제 등 공통 UI 문구만 (특정 몰 상표명 없음).
    # true면 줄에서 공백 제거 후 매칭(OCR 음절 사이 공백 대응).
    name-line-noise-match-collapsed: true
    name-line-noise-regexes:
      - ".*도착.*보장.*"
      - ".*무료.*배송.*"
      - ".*(오늘|내일|당일|익일).{0,12}(배송|출고|도착).*"
      - ".*캐시.*적립.*"
      - ".*적립.*최대.*"
      - "(?i).*applecare.*"
      - ".*서울.*경기.*(주문|도착|기준).*"
      - ".*상품평.*[0-9].*"
      - ".*한달.*구매.*"
      # 간편결제·지갑·카드/계좌 안내 줄 (브랜드 없이 흔한 결제 카피)
      - ".*간편한?결제.*"
      - ".*(에서도)?간편한?결제.*"
      - ".*페이머니.*"
      - ".*@.*페이머니.*"
      - ".*(카드계좌|계좌이제).*"
      - ".*머니.{0,6}(카드|계좌).*"
      - ".*브랜드샵.*"
    # 메뉴/카테고리/로그인 등 '페이지 UI' 줄을 상품명으로 뽑지 않도록 (공백 제거 후 포함 검사)
    name-line-ui-keywords:
      - 로그인
      - 카테고리
      - 마이쇼핑
      - 상품명또는브랜드
      - 브랜드입력
      - 베스트
      - 슈퍼적립
      - 쇼핑라이브
      - 지금배달
      - 선물샵
      - 패션타운
      - 푸드윈도
      - 기획전
      - 오늘끝딜
    name-line-ui-keyword-min-hits: 3
  spend-conversion:
    units:
      - label: 스타벅스 아메리카노
        unit-price-won: 4500
      - label: 햄버거 세트
        unit-price-won: 8000
      - label: 편의점 커피
        unit-price-won: 2000
      - label: 두쫀쿠(1봉)
        unit-price-won: 6500

gemini:
  # .env 에 GEMINI_API_KEY만 넣으면 자동으로 보정이 켜집니다.
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  timeout-ms: ${GEMINI_TIMEOUT_MS:20000}
  min-confidence: ${GEMINI_MIN_CONFIDENCE:0.50}
